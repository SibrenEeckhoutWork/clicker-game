<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed dark background (maskable: content in centre 80%) -->
  <rect width="512" height="512" fill="#0a0c0f"/>

  <!-- Safe zone: 51px padding each side → content within 410×410 centred -->

  <!-- Subtle grid (within safe zone) -->
  <line x1="51" y1="200" x2="461" y2="200" stroke="#1e2430" stroke-width="1"/>
  <line x1="51" y1="290" x2="461" y2="290" stroke="#1e2430" stroke-width="1"/>
  <line x1="175" y1="51" x2="175" y2="420" stroke="#1e2430" stroke-width="1"/>
  <line x1="337" y1="51" x2="337" y2="420" stroke="#1e2430" stroke-width="1"/>

  <!-- Chart fill -->
  <polygon
    points="80,390 160,300 240,330 310,200 390,250 440,130 440,400 80,400"
    fill="#22c55e" opacity="0.07"/>

  <!-- Chart line -->
  <polyline
    points="80,390 160,300 240,330 310,200 390,250 440,130"
    fill="none" stroke="#22c55e" stroke-width="20"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Live dot -->
  <circle cx="440" cy="130" r="14" fill="#22c55e"/>
  <circle cx="440" cy="130" r="26" fill="#22c55e" opacity="0.22"/>

  <!-- Axis -->
  <line x1="68" y1="410" x2="444" y2="410" stroke="#2a3142" stroke-width="2"/>
</svg>
